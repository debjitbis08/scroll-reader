app = 'scroll-reader'
primary_region = 'iad'

[build]
  dockerfile = 'apps/web/Dockerfile'
  [build.args]

[env]
  PORT = '8080'
  NODE_ENV = 'production'
  CHUNKER_BIN = '/usr/local/bin/chunker'
  EXTRACTOR_BIN = '/usr/local/bin/extractor'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1024mb'
  cpu_kind = 'shared'
  cpus = 1
