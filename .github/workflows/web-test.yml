name: Web — Test

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/db/**'
      - 'packages/shared-types/**'
      - 'packages/pipeline/**'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/db/**'
      - 'packages/shared-types/**'
      - 'packages/pipeline/**'
      - 'pnpm-lock.yaml'

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck web app
        run: pnpm --filter @scroll-reader/web typecheck

  test-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run pipeline tests
        run: pnpm --filter @scroll-reader/pipeline test

  build:
    runs-on: ubuntu-latest
    needs: [typecheck, test-pipeline]
    env:
      SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_ANON_KEY: placeholder
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      DISABLE_CRON: "false"
      CRON_SECRET: placeholder
      BOT_USER_ID: ""
      ADMIN_EMAILS: ""
      CF_TURNSTILE_SECRET_KEY: placeholder
      CF_TURNSTILE_SITE_KEY: placeholder
      PUBLIC_POSTHOG_API_KEY: placeholder
      DISABLE_POSTHOG: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @scroll-reader/web build
