[package]
name = "chunker"
version = "0.1.0"
edition = "2021"
description = "Paragraph-aware text chunker for scroll-reader"

[lib]
name = "chunker"
path = "src/lib.rs"

[[bin]]
name = "chunker"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
