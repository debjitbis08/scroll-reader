services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: scroll
      POSTGRES_PASSWORD: scroll
      POSTGRES_DB: scroll_reader
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scroll -d scroll_reader"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: scroll
      MINIO_ROOT_PASSWORD: scrollsecret
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"  # MinIO console

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://scroll:scroll@postgres:5432/scroll_reader
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: scroll
      STORAGE_SECRET_KEY: scrollsecret
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://scroll:scroll@postgres:5432/scroll_reader
      WATCH_DIR: /data/documents
    volumes:
      - documents_data:/data/documents
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  documents_data:
