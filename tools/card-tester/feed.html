<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Tester — Feed Preview</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/contrib/auto-render.min.js"></script>
  <style>
    :root {
      /* Catppuccin Mocha */
      --base: #1e1e2e;
      --mantle: #181825;
      --crust: #11111b;
      --surface0: #313244;
      --surface1: #45475a;
      --surface2: #585b70;
      --overlay0: #6c7086;
      --text: #cdd6f4;
      --subtext0: #a6adc8;
      --subtext1: #bac2de;
      --lavender: #b4befe;
      --blue: #89b4fa;
      --green: #a6e3a1;
      --red: #f38ba8;
      --peach: #fab387;
      --yellow: #f9e2af;
      --mauve: #cba6f7;
      --teal: #94e2d5;
      --pink: #f5c2e7;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--base);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    h1 {
      font-size: 1.4rem;
      color: var(--lavender);
      margin-bottom: 8px;
    }

    .stats {
      color: var(--subtext0);
      font-size: 0.85rem;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--surface0);
    }

    .card {
      background: var(--mantle);
      border: 1px solid var(--surface0);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .card-type {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--mauve);
      margin-bottom: 12px;
    }

    .card-type.discover { color: var(--blue); }
    .card-type.flashcard { color: var(--peach); }
    .card-type.quiz { color: var(--green); }
    .card-type.glossary { color: var(--teal); }
    .card-type.contrast { color: var(--yellow); }
    .card-type.passage { color: var(--pink); }
    .card-type.raw_commentary { color: var(--mauve); }

    .card-body { font-size: 0.95rem; line-height: 1.7; }
    .card-body p { margin-bottom: 8px; }

    /* Flashcard */
    .flashcard-question { font-style: italic; margin-bottom: 12px; }
    .flashcard-answer {
      display: none;
      padding: 12px;
      background: var(--surface0);
      border-radius: 8px;
      margin-top: 8px;
    }
    .flashcard-answer.visible { display: block; }

    .btn {
      display: inline-block;
      padding: 6px 16px;
      border: 1px solid var(--surface1);
      border-radius: 6px;
      background: var(--surface0);
      color: var(--text);
      cursor: pointer;
      font-size: 0.85rem;
    }
    .btn:hover { background: var(--surface1); }

    /* Quiz */
    .quiz-question { font-style: italic; margin-bottom: 12px; }
    .quiz-options { display: flex; flex-direction: column; gap: 8px; }
    .quiz-option {
      padding: 10px 14px;
      border: 1px solid var(--surface1);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: border-color 0.2s;
    }
    .quiz-option:hover { border-color: var(--lavender); }
    .quiz-option.correct { border-color: var(--green); background: rgba(166, 227, 161, 0.1); }
    .quiz-option.incorrect { border-color: var(--red); background: rgba(243, 139, 168, 0.1); }
    .quiz-option.dimmed { opacity: 0.5; }
    .quiz-explanation {
      font-size: 0.8rem;
      color: var(--subtext0);
      margin-top: 6px;
      display: none;
    }
    .quiz-option.correct .quiz-explanation,
    .quiz-option.incorrect .quiz-explanation { display: block; }
    .quiz-label { font-weight: 600; margin-right: 8px; }

    /* Glossary */
    .glossary-term {
      font-size: 1.3rem;
      font-family: Georgia, 'Times New Roman', serif;
      color: var(--teal);
      margin-bottom: 8px;
    }
    .glossary-def { margin-bottom: 8px; }
    .glossary-etymology {
      font-size: 0.85rem;
      color: var(--subtext0);
      font-style: italic;
      margin-bottom: 8px;
    }
    .glossary-related { display: flex; gap: 6px; flex-wrap: wrap; }
    .glossary-pill {
      padding: 2px 10px;
      border: 1px solid var(--surface1);
      border-radius: 12px;
      font-size: 0.8rem;
      color: var(--subtext1);
    }

    /* Contrast */
    .contrast-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .contrast-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .contrast-col {
      padding: 12px;
      background: var(--surface0);
      border-radius: 8px;
    }
    .contrast-col h4 { font-size: 0.85rem; color: var(--lavender); margin-bottom: 8px; }
    .contrast-dim { font-size: 0.75rem; color: var(--subtext0); margin-top: 8px; text-transform: uppercase; }
    .contrast-val { font-size: 0.9rem; margin-bottom: 4px; }

    /* Passage */
    .passage-excerpt {
      font-family: Georgia, 'Times New Roman', serif;
      font-style: italic;
      font-size: 1.05rem;
      line-height: 1.8;
      border-left: 3px solid var(--lavender);
      padding-left: 16px;
      margin-bottom: 12px;
    }
    .passage-commentary {
      font-size: 0.85rem;
      color: var(--subtext0);
    }

    /* Card images (AI-selected figures) */
    .card-images {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0;
    }
    .card-images img {
      max-width: 100%;
      max-height: 300px;
      border-radius: 8px;
      border: 1px solid var(--surface1);
    }

    /* Source chunk toggle */
    .source-toggle {
      font-size: 0.8rem;
      color: var(--overlay0);
      cursor: pointer;
      margin-top: 12px;
      user-select: none;
    }
    .source-toggle:hover { color: var(--subtext0); }
    .source-content {
      display: none;
      margin-top: 8px;
      padding: 12px;
      background: var(--crust);
      border-radius: 8px;
      font-size: 0.82rem;
      color: var(--subtext0);
      line-height: 1.6;
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
    }
    .source-content.visible { display: block; }

    .source-images {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .source-images img {
      max-width: 100%;
      max-height: 250px;
      border-radius: 6px;
      border: 1px solid var(--surface0);
    }

    .chunk-label {
      font-size: 0.75rem;
      color: var(--overlay0);
      margin-bottom: 4px;
    }

    .loading { text-align: center; padding: 40px; color: var(--subtext0); }
    .error { text-align: center; padding: 40px; color: var(--red); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Card Tester</h1>
    <div class="stats" id="stats">Loading...</div>
    <div id="feed"></div>
  </div>

  <script>
    async function loadCards() {
      const feed = document.getElementById('feed')
      const stats = document.getElementById('stats')

      try {
        const res = await fetch('/api/cards')
        if (!res.ok) throw new Error(`${res.status}: ${await res.text()}`)
        const cards = await res.json()

        // Stats
        const typeCounts = {}
        cards.forEach(c => typeCounts[c.cardType] = (typeCounts[c.cardType] || 0) + 1)
        const typeStr = Object.entries(typeCounts).map(([t, n]) => `${t}: ${n}`).join(' · ')
        stats.textContent = `${cards.length} cards · ${typeStr}`

        // Render cards
        feed.innerHTML = ''
        cards.forEach((card, idx) => {
          const el = document.createElement('div')
          el.className = 'card'
          el.innerHTML = renderCard(card, idx)
          feed.appendChild(el)
        })

        // Render LaTeX
        renderMathInElement(document.body, {
          delimiters: [
            { left: '$$', right: '$$', display: true },
            { left: '$', right: '$', display: false },
            { left: '\\(', right: '\\)', display: false },
            { left: '\\[', right: '\\]', display: true },
          ],
          throwOnError: false,
        })
      } catch (err) {
        feed.innerHTML = `<div class="error">${err.message}<br><br>Run "extract" and "generate" first.</div>`
        stats.textContent = 'Error loading cards'
      }
    }

    function renderCard(card, idx) {
      const typeLabel = `<div class="card-type ${card.cardType}">${card.cardType}</div>`
      let body = ''

      switch (card.cardType) {
        case 'discover':
        case 'raw_commentary':
        case 'connect':
          body = renderBody(card.content, card)
          break
        case 'flashcard':
          body = renderFlashcard(card.content, idx, card)
          break
        case 'quiz':
          body = renderQuiz(card.content, idx, card)
          break
        case 'glossary':
          body = renderGlossary(card.content, card)
          break
        case 'contrast':
          body = renderContrast(card.content, card)
          break
        case 'passage':
          body = renderPassage(card.content, card)
          break
        default:
          body = `<pre>${JSON.stringify(card.content, null, 2)}</pre>`
      }

      const source = renderSource(card, idx)
      return typeLabel + body + source
    }

    // Resolve image indices from card content to actual image paths
    function renderCardImages(content, card) {
      const indices = content.images
      if (!indices || !Array.isArray(indices) || indices.length === 0) return ''
      const chunkImages = card.chunk?.images || []
      const imgs = indices
        .filter(i => i >= 0 && i < chunkImages.length)
        .map(i => `<img src="/${chunkImages[i].file}" alt="${esc(chunkImages[i].alt)}" loading="lazy">`)
        .join('')
      return imgs ? `<div class="card-images">${imgs}</div>` : ''
    }

    function renderBody(content, card) {
      const title = content.title ? `<strong>${esc(content.title)}</strong><br>` : ''
      return `<div class="card-body">${title}${esc(content.body)}${renderCardImages(content, card)}</div>`
    }

    function renderFlashcard(content, idx, card) {
      return `
        <div class="card-body">
          <div class="flashcard-question">${esc(content.question)}</div>
          ${renderCardImages(content, card)}
          <button class="btn" onclick="toggleAnswer(${idx})">Reveal Answer</button>
          <div class="flashcard-answer" id="answer-${idx}">${esc(content.answer)}</div>
        </div>`
    }

    function renderQuiz(content, idx, card) {
      const labels = ['A', 'B', 'C', 'D']
      const options = (content.options || []).map((opt, i) => {
        // Strip leading "A)" or "A." prefix if present
        const cleaned = opt.replace(/^[A-Da-d][\)\.]\s*/, '')
        const explanation = content.explanations?.[i] || ''
        return `
          <div class="quiz-option" id="quiz-${idx}-${i}" onclick="selectQuizOption(${idx}, ${i}, ${content.correct})">
            <span class="quiz-label">${labels[i]}.</span>${esc(cleaned)}
            <div class="quiz-explanation">${esc(explanation)}</div>
          </div>`
      }).join('')

      return `
        <div class="card-body">
          <div class="quiz-question">${esc(content.question)}</div>
          ${renderCardImages(content, card)}
          <div class="quiz-options">${options}</div>
        </div>`
    }

    function renderGlossary(content, card) {
      const etymology = content.etymology
        ? `<div class="glossary-etymology">${esc(content.etymology)}</div>` : ''
      const related = (content.related || []).length > 0
        ? `<div class="glossary-related">${content.related.map(t => `<span class="glossary-pill">${esc(t)}</span>`).join('')}</div>` : ''
      return `
        <div class="card-body">
          <div class="glossary-term">${esc(content.term)}</div>
          <div class="glossary-def">${esc(content.definition)}</div>
          ${etymology}${related}
          ${renderCardImages(content, card)}
        </div>`
    }

    function renderContrast(content, card) {
      const dims = content.dimensions || []
      const aVals = content.dimensionA || []
      const bVals = content.dimensionB || []
      const rows = dims.map((dim, i) => `
        <div class="contrast-dim">${esc(dim)}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="contrast-val">${esc(aVals[i] || '')}</div>
          <div class="contrast-val">${esc(bVals[i] || '')}</div>
        </div>`).join('')

      return `
        <div class="card-body">
          <div class="contrast-title">${esc(content.itemA)} vs. ${esc(content.itemB)}</div>
          ${renderCardImages(content, card)}
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
            <div style="font-weight:600;color:var(--lavender);font-size:0.85rem;">${esc(content.itemA)}</div>
            <div style="font-weight:600;color:var(--subtext0);font-size:0.85rem;">${esc(content.itemB)}</div>
          </div>
          ${rows}
        </div>`
    }

    function renderPassage(content, card) {
      const commentary = content.commentary
        ? `<div class="passage-commentary">${esc(content.commentary)}</div>` : ''
      return `
        <div class="card-body">
          <div class="passage-excerpt">${esc(content.excerpt)}</div>
          ${renderCardImages(content, card)}
          ${commentary}
        </div>`
    }

    function renderSource(card, idx) {
      const images = (card.chunk?.images || []).map(img =>
        `<img src="/${img.file}" alt="${esc(img.alt)}" loading="lazy">`
      ).join('')
      const imgSection = images ? `<div class="source-images">${images}</div>` : ''
      const chapter = card.chunk?.chapter ? `<div class="chunk-label">Chunk #${card.chunkIndex} · ${esc(card.chunk.chapter)}</div>` : `<div class="chunk-label">Chunk #${card.chunkIndex}</div>`

      return `
        <div class="source-toggle" onclick="toggleSource(${idx})">source ↓</div>
        <div class="source-content" id="source-${idx}">
          ${chapter}
          ${esc(card.chunk?.content || '')}
          ${imgSection}
        </div>`
    }

    function esc(str) {
      if (!str) return ''
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>')
    }

    function toggleAnswer(idx) {
      const el = document.getElementById(`answer-${idx}`)
      el.classList.toggle('visible')
      renderMathInElement(el, {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '$', right: '$', display: false },
        ],
        throwOnError: false,
      })
    }

    function toggleSource(idx) {
      document.getElementById(`source-${idx}`).classList.toggle('visible')
    }

    function selectQuizOption(cardIdx, optionIdx, correctIdx) {
      const options = document.querySelectorAll(`[id^="quiz-${cardIdx}-"]`)
      // Don't allow re-selection
      if ([...options].some(o => o.classList.contains('correct') || o.classList.contains('incorrect'))) return

      options.forEach((opt, i) => {
        if (i === correctIdx) opt.classList.add('correct')
        else if (i === optionIdx) opt.classList.add('incorrect')
        else opt.classList.add('dimmed')
      })

      // Re-render LaTeX in explanations
      options.forEach(opt => {
        renderMathInElement(opt, {
          delimiters: [
            { left: '$$', right: '$$', display: true },
            { left: '$', right: '$', display: false },
          ],
          throwOnError: false,
        })
      })
    }

    loadCards()
  </script>
</body>
</html>
